site_name: GUIA
site_description: Gateway Universitario de Información y Asistencia — Plataforma AI-native para universidades
site_url: https://upeu-infra.github.io/guia
repo_url: https://github.com/UPeU-Infra/guia
repo_name: UPeU-Infra/guia
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang:
        - es
        - en
  - i18n:
      docs_structure: folder
      languages:
        - locale: es
          default: true
          name: Español
          build: true
          site_name: GUIA
          nav_translations:
            Home: Inicio
        - locale: en
          name: English
          build: true
          site_name: GUIA

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  alternate:
    - name: Español
      link: /guia/
      lang: es
    - name: English
      link: /guia/en/
      lang: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UPeU-Infra/guia

nav:
  - Inicio: index.md
  - Arquitectura: arquitectura.md
  - Estandares: estandares.md
  - Modelo Comercial: modelo-comercial.md
  - Conectores: conectores.md
  - Roadmap: roadmap.md
